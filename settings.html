<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI CADMEY - Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Nunito', sans-serif;
      transition: all 0.2s ease;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      display: flex;
      background-color: #f8fafc;
      color: #000;
      padding: 10px;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background-color: #1A1A2E;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      border-radius: 20px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      will-change: transform;
      height: calc(100vh - 20px);
    }

    .logo {
      color: white;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 40px;
      text-align: center;
      padding: 10px;
      border-radius: 8px;
    }

    .menu-item {
      background-color: #1A1A2E;
      padding: 12px 18px;
      border-radius: 30px;
      color: white;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      margin-bottom: 12px;
      font-size: 14px;
      will-change: transform;
      text-decoration: none !important;
      border: 2px solid #1A1A2E;
    }

    .menu-item:not(.active):hover {
      background-color: #2A2A3E;
      transform: translateX(3px);
      border-color: #D6F26B;
    }

    .menu-item.active {
      background-color: #D6F26B;
      color: #1A1A2E;
      border: 2px solid #D6F26B;
    }

    .menu-item.active:hover {
      background-color: #e8f0a0;
    }

    /* Main content with scrollable area */
    .content {
      flex: 1;
      padding: 25px;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 20px);
      overflow: hidden;
    }

    /* Scrollable content container */
    .scrollable-content {
      flex: 1;
      overflow-y: auto;
      padding-right: 5px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      position: sticky;
      top: 0;
      background: #f8fafc;
      z-index: 10;
      padding: 10px 0;
    }

    .hamburger {
      display: none;
      font-size: 24px;
      cursor: pointer;
      color: #1A1A2E;
    }

    .top-bar h1 {
      font-size: 24px;
      color: #1A1A2E;
    }

    .search-profile {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .search-bar {
      padding: 8px 15px;
      background: #fff;
      border-radius: 30px;
      width: 220px;
      display: flex;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      border: 1px solid #e2e8f0;
      will-change: box-shadow;
    }

    .search-bar:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border-color: #D6F26B;
    }

    .search-bar i {
      color: #64748b;
      font-size: 14px;
    }

    .search-bar input {
      border: none;
      background: transparent;
      margin-left: 8px;
      outline: none;
      width: 100%;
      font-size: 14px;
    }

    .profile-pic {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: #1A1A2E;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
      will-change: transform;
    }

    .profile-pic:hover {
      transform: scale(1.1);
      box-shadow: 0 0 0 3px rgba(214, 242, 107, 0.5);
    }

    /* Settings Content */
    .settings-container {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 30px;
    }

    .settings-sidebar {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .settings-tab {
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .settings-tab:hover {
      background: #f1f5f9;
      color: #1A1A2E;
    }

    .settings-tab.active {
      background: #1A1A2E;
      color: white;
    }

    .settings-content {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      padding: 30px;
    }

    .settings-section {
      margin-bottom: 30px;
    }

    .settings-title {
      font-size: 20px;
      font-weight: bold;
      color: #1A1A2E;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #f1f5f9;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #1A1A2E;
    }

    .form-control {
      width: 100%;
      padding: 10px 15px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
    }

    .form-control:focus {
      outline: none;
      border-color: #D6F26B;
      box-shadow: 0 0 0 3px rgba(214, 242, 107, 0.2);
    }

    .form-text {
      font-size: 13px;
      color: #64748b;
      margin-top: 5px;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #e2e8f0;
      transition: .4s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #1A1A2E;
    }

    input:checked + .slider:before {
      transform: translateX(26px);
    }

    .switch-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: #1A1A2E;
      color: white;
    }

    .btn-primary:hover {
      background: #2A2A3E;
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #1A1A2E;
    }

    .btn-secondary:hover {
      background: #e2e8f0;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .settings-actions {
      display: flex;
      gap: 10px;
      margin-top: 30px;
    }

    /* Hide scrollbars but keep functionality */
    ::-webkit-scrollbar {
      width: 0;
      height: 0;
      background: transparent;
    }

    /* Mobile Responsiveness */
    @media (max-width: 992px) {
      .settings-container {
        grid-template-columns: 1fr;
      }

      .settings-sidebar {
        flex-direction: row;
        overflow-x: auto;
        padding-bottom: 10px;
      }

      .settings-tab {
        white-space: nowrap;
      }
    }

    @media (max-width: 768px) {
      body {
        position: relative;
        padding: 0;
      }

      .sidebar {
        position: fixed;
        left: -250px;
        top: 0;
        bottom: 0;
        height: 100vh;
        z-index: 1000;
        transition: left 0.3s ease;
        border-radius: 0;
        padding-top: 60px;
      }

      .sidebar.show {
        left: 0;
      }

      .sidebar.show .menu-item {
        padding: 12px 15px;
        font-size: 13px;
        margin-bottom: 10px;
      }

      .sidebar.show .logo {
        position: fixed;
        top: 0;
        left: 0;
        width: 250px;
        margin-bottom: 20px;
        padding: 15px;
        background-color: rgba(0,0,0,0.2);
        border-radius: 0;
      }

      .overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.5);
        z-index: 999;
      }

      .overlay.show {
        display: block;
      }

      .hamburger {
        display: block;
        position: fixed;
        top: 15px;
        left: 15px;
        z-index: 1001;
      }

      .content {
        padding: 15px;
        width: 100%;
        height: 100vh;
        padding-top: 70px;
      }

      .top-bar {
        flex-direction: row;
        gap: 15px;
        align-items: center;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: #f8fafc;
        padding: 15px;
        z-index: 900;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      }

      .settings-content {
        padding: 20px;
      }
    }

    @media (max-width: 480px) {
      .top-bar {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
        padding: 15px 15px 15px 60px;
      }

      .search-profile {
        width: 100%;
      }

      .search-bar {
        width: 100%;
      }

      .settings-actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay"></div>
  <div class="sidebar" id="sidebar">
    <div class="logo">AI CADMEY</div>
    <a href="index.html" class="menu-item"><i class="fas fa-chart-bar"></i> Dashboard</a>
    <a href="profile.html" class="menu-item"><i class="fas fa-user"></i> Profile</a>
    <a href="projects.html" class="menu-item"><i class="fas fa-project-diagram"></i> Projects</a>
    <a href="analytics.html" class="menu-item"><i class="fas fa-chart-line"></i> Analytics</a>
    <a href="resources.html" class="menu-item"><i class="fas fa-book"></i> Resources</a>
    <a href="notifications.html" class="menu-item"><i class="fas fa-bell"></i> Notifications</a>
    <a href="settings.html" class="menu-item active"><i class="fas fa-cog"></i> Settings</a>
  </div>

  <div class="content" id="content">
    <div class="top-bar">
      <div class="hamburger" id="hamburger">
        <i class="fas fa-bars"></i>
      </div>
      <h1>Settings</h1>
      <div class="search-profile">
        <div class="search-bar">
          <i class="fas fa-search"></i>
          <input type="text" placeholder="Search settings..." id="searchInput">
        </div>
        <div class="profile-pic">K</div>
      </div>
    </div>

    <div class="scrollable-content">
      <div class="settings-container">
        <div class="settings-sidebar">
          <div class="settings-tab active" data-tab="account">
            <i class="fas fa-user-cog"></i>
            <span>Account</span>
          </div>
          <div class="settings-tab" data-tab="notifications">
            <i class="fas fa-bell"></i>
            <span>Notifications</span>
          </div>
          <div class="settings-tab" data-tab="privacy">
            <i class="fas fa-lock"></i>
            <span>Privacy</span>
          </div>
          <div class="settings-tab" data-tab="appearance">
